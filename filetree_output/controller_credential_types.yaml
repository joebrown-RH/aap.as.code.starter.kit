---
controller_credential_types:
  - name: Mail Server
    description: |-
      {%- raw -%}
      SMTP Credential for sending mail
      {%- endraw -%}
    kind: cloud
    inputs:
      fields:
        - id: smtp_server
          type: string
          label: Mail Server
        - id: smtp_port
          type: string
          label: Mail Server Port
        - id: smtp_username
          type: string
          label: Mail Server Username
        - id: smtp_password
          type: string
          label: Mail Server Password
          secret: true
      required:
        - smtp_server
        - smtp_port
        - smtp_username
        - smtp_password
    injectors:
      extra_vars:
        MAILHOST: '{%- raw -%} ''{{smtp_server}}'' {%- endraw -%}'
        MAILHOST_PORT: '{%- raw -%} ''{{smtp_port}}'' {%- endraw -%}'
        MAILHOST_PASSWORD: '{%- raw -%} ''{{smtp_password}}'' {%- endraw -%}'
        MAILHOST_USERNAME: '{%- raw -%} ''{{smtp_username}}'' {%- endraw -%}'
  - name: My API KEYS
    description: |-
      {%- raw -%}
      My API Keys demonstration
      {%- endraw -%}
    kind: cloud
    inputs:
      fields:
        - id: DYNATRACE_API_KEY
          type: string
          label: Dynatrace API Token
          secret: true
        - id: freshservice_api_key
          type: string
          label: Fresh Service API Token
          secret: true
      required:
        - DYNATRACE_API_KEY
    injectors:
      env:
        DYNATRACE_API_KEY: '{%- raw -%} ''{{ DYNATRACE_API_KEY }}'' {%- endraw -%}'
        freshservice_api_key: '{%- raw -%} ''{{ freshservice_api_key }}'' {%- endraw -%}'
  - name: Network F5
    description: |-
      {%- raw -%}
      This is used by the patching demo
      {%- endraw -%}
    kind: cloud
    inputs:
      fields:
        - id: username
          type: string
          label: Username
        - id: password
          type: string
          label: Password
          secret: true
      required:
        - username
        - password
    injectors:
      env:
        password: '{%- raw -%} ''{{ password }}'' {%- endraw -%}'
        username: '{%- raw -%} ''{{ username }}'' {%- endraw -%}'
  - name: Red Hat Customer Portal
    description: |-
      {%- raw -%}
      Red Hat Customer Portal Credential
      {%- endraw -%}
    kind: cloud
    inputs:
      fields:
        - id: user
          type: string
          label: Red Hat Customer Portal Username (access.redhat.com)
        - id: password
          type: string
          label: Red Hat Customer Portal Password
          secret: true
      required:
        - user
        - password
    injectors:
      extra_vars:
        customer_portal_password: '{%- raw -%} ''{{password}}'' {%- endraw -%}'
        customer_portal_username: '{%- raw -%} ''{{user}}'' {%- endraw -%}'
  - name: ServiceNow ITSM Credential
    description: |-
      {%- raw -%}
      ServiceNow ITSM Credential
      {%- endraw -%}
    kind: cloud
    inputs:
      fields:
        - id: instance
          type: string
          label: Instance
        - id: username
          type: string
          label: username
        - id: password
          type: string
          label: password
          secret: true
      required:
        - instance
        - username
        - password
    injectors:
      env:
        SN_HOST: '{%- raw -%} ''{{instance}}'' {%- endraw -%}'
        SN_PASSWORD: '{%- raw -%} ''{{password}}'' {%- endraw -%}'
        SN_USERNAME: '{%- raw -%} ''{{username}}'' {%- endraw -%}'
...
