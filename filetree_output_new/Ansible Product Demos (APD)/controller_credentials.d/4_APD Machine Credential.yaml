---
controller_credentials:
  - name: APD Machine Credential
    description: |-
      {%- raw -%}
      Machine credential for Windows (username/password) and Linux (SSH key) instances
      {%- endraw -%}
    credential_type: Machine
    organization: Ansible Product Demos (APD)
    inputs:
      password: '{{ vaulted_controller_credentials_apd_machine_credential_password }}'
      username: admin
      ssh_key_data: '{{ vaulted_controller_credentials_apd_machine_credential_ssh_key_data }}'
...
