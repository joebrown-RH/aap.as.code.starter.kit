---
controller_templates:
  - name: APD | Multi-demo setup
    organization: Ansible Product Demos (APD)
    project: Ansible Product Demos
    inventory: Ansible Product Demos Inventory
    playbook: multi_select_setup.yml
    scm_branch: ""
    forks: 0
    limit: ""
    verbosity: 0
    job_type: run
    job_slice_count: 1
    use_fact_cache: false
    credentials:
      - AAP Credential
    allow_simultaneous: false
    ask_scm_branch_on_launch: false
    ask_diff_mode_on_launch: false
    ask_tags_on_launch: false
    ask_skip_tags_on_launch: false
    ask_job_type_on_launch: false
    ask_verbosity_on_launch: false
    ask_variables_on_launch: false
    ask_inventory_on_launch: false
    ask_limit_on_launch: false
    ask_credential_on_launch: false
    ask_execution_environment_on_launch: false
    ask_labels_on_launch: false
    ask_forks_on_launch: false
    ask_job_slice_count_on_launch: false
    ask_timeout_on_launch: false
    ask_instance_groups_on_launch: false
    extra_vars: ""
    job_tags: ""
    force_handlers: false
    skip_tags: ""
    start_at_task: ""
    timeout: 0
    execution_environment: Product Demos EE
    host_config_key: ""
    survey_enabled: true
    survey_spec:
      name: ""
      spec:
        - type: multiselect
          choices:
            - '{%- raw -%}cloud{%- endraw -%}'
            - '{%- raw -%}linux{%- endraw -%}'
            - '{%- raw -%}network{%- endraw -%}'
            - '{%- raw -%}openshift{%- endraw -%}'
            - '{%- raw -%}satellite{%- endraw -%}'
            - '{%- raw -%}windows{%- endraw -%}'
          default: |-
            {%- raw -%}cloud
            linux
            network
            openshift
            windows{%- endraw -%}
          required: True
          variable: demos
          question_name: '{%- raw -%}Which demos do you want to configure?{%- endraw -%}'
      description: ""
    become_enabled: false
    diff_mode: false
    webhook_service: ""
    prevent_instance_group_fallback: false
...
