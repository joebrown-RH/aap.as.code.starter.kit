---
controller_inventory_sources:
  - name: running
    description: |-
      {%- raw -%}
      AWS running ec2
      {%- endraw -%}
    organization: IT Service Automation
    source: ec2
    limit: ""
    source_path: ""
    source_vars:
      plugin: amazon.aws.aws_ec2
      regions:
        - us-west-1
      filters:
        instance-state-name: running
      strict: false
      keyed_groups:
        - key: tags.Application
          separator: ""
    inventory: Datacenter 1
    update_on_launch: "False"
    overwrite: "True"
    credential: AWS
...
