---
controller_templates:
  - name: F5 -6- AWS -Delete VIP
    organization: IT Service Automation
    project: mlowcher_F5_examples
    inventory: AAP Managed Inventory
    playbook: 4_bigip_virtual_server.yml
    scm_branch: ""
    forks: 0
    limit: ""
    verbosity: 0
    job_type: run
    job_slice_count: 1
    use_fact_cache: false
    credentials:
      - Daily Demo F5 Network
    allow_simultaneous: false
    ask_scm_branch_on_launch: false
    ask_diff_mode_on_launch: false
    ask_tags_on_launch: false
    ask_skip_tags_on_launch: false
    ask_job_type_on_launch: false
    ask_verbosity_on_launch: false
    ask_variables_on_launch: false
    ask_inventory_on_launch: false
    ask_limit_on_launch: false
    ask_credential_on_launch: false
    ask_execution_environment_on_launch: false
    ask_labels_on_launch: false
    ask_forks_on_launch: false
    ask_job_slice_count_on_launch: false
    ask_timeout_on_launch: false
    ask_instance_groups_on_launch: false
    extra_vars: ""
    job_tags: ""
    force_handlers: false
    skip_tags: ""
    start_at_task: ""
    timeout: 0
    execution_environment: F5_ee
    host_config_key: ""
    survey_enabled: true
    survey_spec:
      name: F5-6-AWS-Delete_VIP
      spec:
        - max: 1024
          min: 0
          type: text
          default: '{%- raw -%}my_cool_vip{%- endraw -%}'
          required: True
          variable: vs_name
          new_question: True
          question_name: '{%- raw -%}Provide a name for the virtual server{%- endraw -%}'
        - max: 0
          min: 0
          type: multiplechoice
          choices:
            - '{%- raw -%}p{%- endraw -%}'
            - '{%- raw -%}r{%- endraw -%}'
            - '{%- raw -%}e{%- endraw -%}'
            - '{%- raw -%}s{%- endraw -%}'
            - '{%- raw -%}e{%- endraw -%}'
            - '{%- raw -%}n{%- endraw -%}'
            - '{%- raw -%}t{%- endraw -%}'
            - |-
              {%- raw -%}
              {%- endraw -%}
            - '{%- raw -%}a{%- endraw -%}'
            - '{%- raw -%}b{%- endraw -%}'
            - '{%- raw -%}s{%- endraw -%}'
            - '{%- raw -%}e{%- endraw -%}'
            - '{%- raw -%}n{%- endraw -%}'
            - '{%- raw -%}t{%- endraw -%}'
          default: '{%- raw -%}absent{%- endraw -%}'
          required: True
          variable: state
          new_question: True
          question_name: '{%- raw -%}Add or remove{%- endraw -%}'
      description: Basic Survey
    become_enabled: false
    diff_mode: false
    webhook_service: ""
    prevent_instance_group_fallback: false
...
