---
eda_credential_types:
  - name: AWS Secrets Manager lookup
    namespace: aws_secretsmanager_credential
    description: ""
    kind: external
    inputs:
      fields:
        - id: aws_access_key
          type: string
          label: AWS Access Key
        - id: aws_secret_key
          type: string
          label: AWS Secret Key
          secret: true
      metadata:
        - id: region_name
          type: string
          label: AWS Secrets Manager Region
          help_text: Region which the secrets manager is located
        - id: secret_name
          type: string
          label: AWS Secret Name
      required:
        - aws_access_key
        - aws_secret_key
        - region_name
        - secret_name
    injectors: {}
  - name: Basic Event Stream
    namespace: event_stream
    description: Credential for EventStreams that use Basic Authentication. It requires a username and password
    kind: basic
    inputs:
      fields:
        - id: auth_type
          type: string
          label: Event Stream Authentication Type
          hidden: true
          default: basic
        - id: username
          type: string
          label: Username
          help_text: The username used to authenticate the incoming event stream
        - id: password
          type: string
          label: Password
          secret: true
          help_text: The password used to authenticate the incoming event stream
        - id: http_header_key
          type: string
          label: HTTP Header Key
          hidden: true
          default: Authorization
      required:
        - auth_type
        - password
        - username
        - http_header_key
    injectors: {}
  - name: Centrify Vault Credential Provider Lookup
    namespace: centrify_vault_kv
    description: ""
    kind: external
    inputs:
      fields:
        - id: url
          type: string
          label: Centrify Tenant URL
          format: url
          help_text: Centrify Tenant URL
        - id: client_id
          type: string
          label: Centrify API User
          help_text: Centrify API User, having necessary permissions as mentioned in support doc
        - id: client_password
          type: string
          label: Centrify API Password
          secret: true
          help_text: Password of Centrify API User with necessary permissions
        - id: oauth_application_id
          type: string
          label: OAuth2 Application ID
          default: awx
          help_text: Application ID of the configured OAuth2 Client (defaults to 'awx')
        - id: oauth_scope
          type: string
          label: OAuth2 Scope
          default: awx
          help_text: Scope of the configured OAuth2 Client (defaults to 'awx')
      metadata:
        - id: account-name
          type: string
          label: Account Name
          help_text: Local system account or Domain account name enrolled in Centrify Vault. eg. (root or DOMAIN/Administrator)
        - id: system-name
          type: string
          label: System Name
          help_text: Machine Name enrolled with in Centrify Portal
      required:
        - url
        - account-name
        - system-name
        - client_id
        - client_password
    injectors: {}
  - name: Container Registry
    namespace: registry
    description: ""
    kind: registry
    inputs:
      fields:
        - id: host
          type: string
          label: Authentication URL
          default: quay.io
          help_text: Authentication endpoint for the container registry.
        - id: username
          type: string
          label: Username
        - id: password
          type: string
          label: Password or Token
          secret: true
          help_text: A password or token used to authenticate with
        - id: verify_ssl
          type: boolean
          label: Verify SSL
          default: true
      required:
        - host
    injectors: {}
  - name: CyberArk Central Credential Provider Lookup
    namespace: aim
    description: ""
    kind: external
    inputs:
      fields:
        - id: url
          type: string
          label: CyberArk CCP URL
          format: url
        - id: webservice_id
          type: string
          label: Web Service ID
          help_text: The CCP Web Service ID. Leave blank to default to AIMWebService.
        - id: app_id
          type: string
          label: Application ID
          secret: true
        - id: client_key
          type: string
          label: Client Key
          secret: true
          multiline: true
        - id: client_cert
          type: string
          label: Client Certificate
          secret: true
          multiline: true
        - id: verify
          type: boolean
          label: Verify SSL Certificates
          default: true
      metadata:
        - id: object_query
          type: string
          label: Object Query
          help_text: 'Lookup query for the object. Ex: Safe=TestSafe;Object=testAccountName123'
        - id: object_query_format
          type: string
          label: Object Query Format
          choices:
            - Exact
            - Regexp
          default: Exact
        - id: object_property
          type: string
          label: Object Property
          help_text: 'The property of the object to return. Available properties: Username, Password and Address.'
        - id: reason
          type: string
          label: Reason
          help_text: Object request reason. This is only needed if it is required by the object's policy.
      required:
        - url
        - app_id
        - object_query
    injectors: {}
  - name: CyberArk Conjur Secrets Manager Lookup
    namespace: conjur
    description: ""
    kind: external
    inputs:
      fields:
        - id: url
          type: string
          label: Conjur URL
          format: url
        - id: api_key
          type: string
          label: API Key
          secret: true
        - id: account
          type: string
          label: Account
        - id: username
          type: string
          label: Username
        - id: cacert
          type: string
          label: Public Key Certificate
          multiline: true
      metadata:
        - id: secret_path
          type: string
          label: Secret Identifier
          help_text: The identifier for the secret e.g., /some/identifier
        - id: secret_version
          type: string
          label: Secret Version
          help_text: Used to specify a specific secret version (if left empty, the latest version will be used).
      required:
        - url
        - api_key
        - account
        - username
    injectors: {}
  - name: Dynatrace Event Stream
    namespace: event_stream
    description: Credential for Dynatrace Event Stream. This is a clone of the Basic authentication.
    kind: dynatrace
    inputs:
      fields:
        - id: auth_type
          type: string
          label: Event Stream Authentication Type
          hidden: true
          default: basic
        - id: username
          type: string
          label: Username
          help_text: The username used to authenticate the incoming event stream
        - id: password
          type: string
          label: Password
          secret: true
          help_text: The password used to authenticate the incoming event stream
        - id: http_header_key
          type: string
          label: HTTP Header Key
          hidden: true
          default: Authorization
          help_text: The HTTP header for passing in the credentials usually this is Authorization.
      required:
        - auth_type
        - username
        - password
        - http_header_key
    injectors: {}
  - name: ECDSA Event Stream
    namespace: event_stream
    description: Credential for Event Streams that use Elliptic Curve DSA. This requires a public key and the headers that carry the signature.
    kind: ecdsa
    inputs:
      fields:
        - id: auth_type
          type: string
          label: Event Stream Authentication Type
          hidden: true
          default: ecdsa
        - id: http_header_key
          type: string
          label: Primary Header Key
          help_text: The sender will use this HTTP header to pass in the signature
        - id: public_key
          type: string
          label: Public Key
          help_text: Public Key for validating the data, this would be available from the sender after you have created the event stream on their side with our URL. This is usually a 2 step process
          multiline: true
        - id: prefix_http_header_key
          type: string
          label: Additional Prefix Header Key
          help_text: Additional Header Key for ECDSA.
        - id: signature_encoding
          type: string
          label: Signature Encoding
          choices:
            - base64
            - hex
          default: base64
          help_text: The payload signature which is binary is converted as a base64 or hex strings before being added to the HTTP header
        - id: hash_algorithm
          type: string
          label: Hash algorithm
          choices:
            - blake2b
            - blake2s
            - md5
            - md5-sha1
            - ripemd160
            - sha1
            - sha224
            - sha256
            - sha384
            - sha3_224
            - sha3_256
            - sha3_384
            - sha3_512
            - sha512
            - sha512_224
            - sha512_256
            - shake_128
            - shake_256
            - sm3
          default: sha256
          help_text: The EventStream sender hashes the message being sent using one of these algorithms, which guarantees message integrity.
      required:
        - auth_type
        - http_header_key
        - public_key
        - signature_encoding
        - hash_algorithm
    injectors: {}
  - name: GitHub App Installation Access Token Lookup
    namespace: github_app
    description: ""
    kind: external
    inputs:
      fields:
        - id: github_api_url
          type: string
          label: GitHub API endpoint URL
          default: https://api.github.com
          help_text: 'Specify the GitHub API URL here. In the case of an Enterprise: https://gh.your.org/api/v3 (self-hosted) or https://api.SUBDOMAIN.ghe.com (cloud)'
        - id: app_or_client_id
          type: string
          label: GitHub App ID
          help_text: 'The GitHub App ID created by the GitHub Admin. Example App ID: 1121547 found on https://github.com/settings/apps/ required for creating a JWT token for authentication.'
        - id: install_id
          type: string
          label: GitHub App Installation ID
          help_text: 'The Installation ID from the GitHub App installation generated by the GitHub Admin. Example: 59980338 extracted from the installation link https://github.com/settings/installations/59980338 required for creating a limited GitHub app token.'
        - id: private_rsa_key
          type: string
          label: RSA Private Key
          format: ssh_private_key
          secret: true
          help_text: Paste the contents of the PEM file that the GitHub Admin provided to you with the app and installation IDs.
          multiline: true
      metadata:
        - id: description
          type: string
          label: Description (Optional)
          help_text: To be removed after UI is updated
      required:
        - app_or_client_id
        - install_id
        - private_rsa_key
    injectors: {}
  - name: GitHub Event Stream
    namespace: event_stream
    description: Credential for Github EventStream. This is a specialization of the HMAC authentication which only requires a secret to be provided.
    kind: github
    inputs:
      fields:
        - id: auth_type
          type: string
          label: Event Stream Authentication Type
          hidden: true
          default: hmac
        - id: secret
          type: string
          label: HMAC Secret
          secret: true
          help_text: The symmetrical shared secret between EDA and the EventStream Server. Please save this value since you would need it on the EventStream Server.
        - id: hash_algorithm
          type: string
          label: HMAC Algorithm
          hidden: true
          choices:
            - sha128
            - sha256
            - sha512
            - sha1024
          default: sha256
          help_text: The EventStream sender hashes the message being sent using one of these algorithms, which guarantees message integrity.
        - id: http_header_key
          type: string
          label: HTTP Header Key
          hidden: true
          default: X-Hub-Signature-256
          help_text: The event stream sender typically uses a special HTTP header to send the signature of the payload. e.g X-Hub-Signature-256
        - id: signature_encoding
          type: string
          label: Signature Encoding
          hidden: true
          choices:
            - base64
            - hex
          default: hex
          help_text: The payload signature which is binary is converted as a base64 or hex strings before being added to the HTTP header
        - id: signature_prefix
          type: string
          label: Signature prefix
          hidden: true
          default: sha256=
          help_text: The signature might optionally have a prefix.e.g sha256=
      required:
        - auth_type
        - secret
        - hash_algorithm
        - http_header_key
        - signature_encoding
        - signature_prefix
    injectors: {}
  - name: GitLab Event Stream
    namespace: event_stream
    description: Credential for Gitlab Event Streams. This is a specialization of the Token authentication with the X-Gitlab-Token header.
    kind: gitlab
    inputs:
      fields:
        - id: auth_type
          type: string
          label: Event Stream Authentication Type
          hidden: true
          default: token
        - id: token
          type: string
          label: Token
          secret: true
          help_text: The symmetrical shared token between EDA and the Gitlab Server. Please save this value since you would need it on the EventStream Server.
        - id: http_header_key
          type: string
          label: HTTP Header Key
          hidden: true
          default: X-Gitlab-Token
          help_text: The HTTP header for passing in the token usually this is Authorization but some sites use a different header, e.g. X-Gitlab-Token
      required:
        - auth_type
        - token
        - http_header_key
    injectors: {}
  - name: GPG Public Key
    namespace: gpg_public_key
    description: ""
    kind: cryptography
    inputs:
      fields:
        - id: gpg_public_key
          type: string
          label: GPG Public Key
          secret: true
          help_text: GPG Public Key used to validate content signatures.
          multiline: true
      required:
        - gpg_public_key
    injectors: {}
  - name: HashiCorp Vault Secret Lookup
    namespace: hashivault_kv
    description: ""
    kind: external
    inputs:
      fields:
        - id: url
          type: string
          label: Server URL
          format: url
          help_text: The URL to the HashiCorp Vault
        - id: token
          type: string
          label: Token
          secret: true
          help_text: The access token used to authenticate to the Vault server
        - id: cacert
          type: string
          label: CA Certificate
          help_text: The CA certificate used to verify the SSL certificate of the Vault server
          multiline: true
        - id: role_id
          type: string
          label: AppRole role_id
          help_text: The Role ID for AppRole Authentication
          multiline: false
        - id: secret_id
          type: string
          label: AppRole secret_id
          secret: true
          help_text: The Secret ID for AppRole Authentication
          multiline: false
        - id: client_cert_public
          type: string
          label: Client Certificate
          help_text: The PEM-encoded client certificate used for TLS client authentication. This should include the certificate and any intermediate certififcates.
          multiline: true
        - id: client_cert_private
          type: string
          label: Client Certificate Key
          secret: true
          help_text: The certificate private key used for TLS client authentication.
          multiline: true
        - id: client_cert_role
          type: string
          label: TLS Authentication Role
          help_text: The role configured in Hashicorp Vault for TLS client authentication. If not provided, Hashicorp Vault may assign roles based on the certificate used.
          multiline: false
        - id: namespace
          type: string
          label: Namespace name (Vault Enterprise only)
          help_text: Name of the namespace to use when authenticate and retrieve secrets
          multiline: false
        - id: kubernetes_role
          type: string
          label: Kubernetes role
          help_text: The Role for Kubernetes Authentication. This is the named role, configured in Vault server, for AWX pod auth policies. see https://www.vaultproject.io/docs/auth/kubernetes#configuration
          multiline: false
        - id: username
          type: string
          label: Username
          secret: false
          help_text: Username for user authentication.
        - id: password
          type: string
          label: Password
          secret: true
          help_text: Password for user authentication.
        - id: default_auth_path
          type: string
          label: Path to Auth
          default: approle
          help_text: The Authentication path to use if one isn't provided in the metadata when linking to an input field. Defaults to 'approle'
          multiline: false
        - id: api_version
          type: string
          label: API Version
          choices:
            - v1
            - v2
          default: v1
          help_text: API v1 is for static key/value lookups.  API v2 is for versioned key/value lookups.
      metadata:
        - id: secret_backend
          type: string
          label: Name of Secret Backend
          help_text: The name of the kv secret backend (if left empty, the first segment of the secret path will be used).
        - id: secret_path
          type: string
          label: Path to Secret
          help_text: The path to the secret stored in the secret backend e.g, /some/secret/. It is recommended that you use the secret backend field to identify the storage backend and to use this field for locating a specific secret within that store. However, if you prefer to fully identify both the secret backend and one of its secrets using only this field, join their locations into a single path without any additional separators, e.g, /location/of/backend/some/secret.
        - id: auth_path
          type: string
          label: Path to Auth
          help_text: The path where the Authentication method is mounted e.g, approle
          multiline: false
        - id: secret_key
          type: string
          label: Key Name
          help_text: The name of the key to look up in the secret.
        - id: secret_version
          type: string
          label: Secret Version (v2 only)
          help_text: Used to specify a specific secret version (if left empty, the latest version will be used).
      required:
        - url
        - secret_path
        - api_version
        - secret_key
    injectors: {}
  - name: HashiCorp Vault Signed SSH
    namespace: hashivault_ssh
    description: ""
    kind: external
    inputs:
      fields:
        - id: url
          type: string
          label: Server URL
          format: url
          help_text: The URL to the HashiCorp Vault
        - id: token
          type: string
          label: Token
          secret: true
          help_text: The access token used to authenticate to the Vault server
        - id: cacert
          type: string
          label: CA Certificate
          help_text: The CA certificate used to verify the SSL certificate of the Vault server
          multiline: true
        - id: role_id
          type: string
          label: AppRole role_id
          help_text: The Role ID for AppRole Authentication
          multiline: false
        - id: secret_id
          type: string
          label: AppRole secret_id
          secret: true
          help_text: The Secret ID for AppRole Authentication
          multiline: false
        - id: client_cert_public
          type: string
          label: Client Certificate
          help_text: The PEM-encoded client certificate used for TLS client authentication. This should include the certificate and any intermediate certififcates.
          multiline: true
        - id: client_cert_private
          type: string
          label: Client Certificate Key
          secret: true
          help_text: The certificate private key used for TLS client authentication.
          multiline: true
        - id: client_cert_role
          type: string
          label: TLS Authentication Role
          help_text: The role configured in Hashicorp Vault for TLS client authentication. If not provided, Hashicorp Vault may assign roles based on the certificate used.
          multiline: false
        - id: namespace
          type: string
          label: Namespace name (Vault Enterprise only)
          help_text: Name of the namespace to use when authenticate and retrieve secrets
          multiline: false
        - id: kubernetes_role
          type: string
          label: Kubernetes role
          help_text: The Role for Kubernetes Authentication. This is the named role, configured in Vault server, for AWX pod auth policies. see https://www.vaultproject.io/docs/auth/kubernetes#configuration
          multiline: false
        - id: username
          type: string
          label: Username
          secret: false
          help_text: Username for user authentication.
        - id: password
          type: string
          label: Password
          secret: true
          help_text: Password for user authentication.
        - id: default_auth_path
          type: string
          label: Path to Auth
          default: approle
          help_text: The Authentication path to use if one isn't provided in the metadata when linking to an input field. Defaults to 'approle'
          multiline: false
      metadata:
        - id: public_key
          type: string
          label: Unsigned Public Key
          multiline: true
        - id: secret_path
          type: string
          label: Path to Secret
          help_text: The path to the secret stored in the secret backend e.g, /some/secret/. It is recommended that you use the secret backend field to identify the storage backend and to use this field for locating a specific secret within that store. However, if you prefer to fully identify both the secret backend and one of its secrets using only this field, join their locations into a single path without any additional separators, e.g, /location/of/backend/some/secret.
        - id: auth_path
          type: string
          label: Path to Auth
          help_text: The path where the Authentication method is mounted e.g, approle
          multiline: false
        - id: role
          type: string
          label: Role Name
          help_text: The name of the role used to sign.
        - id: valid_principals
          type: string
          label: Valid Principals
          help_text: Valid principals (either usernames or hostnames) that the certificate should be signed for.
      required:
        - url
        - secret_path
        - public_key
        - role
    injectors: {}
  - name: HMAC Event Stream
    namespace: event_stream
    description: Credential for Event Streams that use HMAC. This requires shared secret between the sender and receiver. The signature can be sent as hex or base64 strings. Most of senders will use a special HTTP header to send the signature data.
    kind: hmac
    inputs:
      fields:
        - id: auth_type
          type: string
          label: Event Stream Authentication Type
          hidden: true
          default: hmac
        - id: secret
          type: string
          label: Secret
          secret: true
          help_text: The symmetrical shared secret between EDA and the Event Stream Server. Please save this value since you would need it on the Event Stream Server.
        - id: hash_algorithm
          type: string
          label: Hash algorithm
          choices:
            - blake2b
            - blake2s
            - md5
            - md5-sha1
            - ripemd160
            - sha1
            - sha224
            - sha256
            - sha384
            - sha3_224
            - sha3_256
            - sha3_384
            - sha3_512
            - sha512
            - sha512_224
            - sha512_256
            - shake_128
            - shake_256
            - sm3
          default: sha256
          help_text: The EventStream sender hashes the message being sent using one of these algorithms, which guarantees message integrity.
        - id: http_header_key
          type: string
          label: HMAC Header Key
          default: X-Hub-Signature-256
          help_text: The event stream sender typically uses a special HTTP header to send the signature of the payload. e.g X-Hub-Signature-256
        - id: signature_encoding
          type: string
          label: Signature Encoding
          choices:
            - base64
            - hex
          default: base64
          help_text: The payload signature which is binary is converted as a base64 or hex strings before being added to the HTTP header
        - id: signature_prefix
          type: string
          label: Signature prefix
          help_text: The signature might optionally have a prefix.e.g sha256=
      required:
        - auth_type
        - secret
        - hash_algorithm
        - http_header_key
        - signature_encoding
    injectors: {}
  - name: Microsoft Azure Key Vault
    namespace: azure_kv
    description: ""
    kind: external
    inputs:
      fields:
        - id: url
          type: string
          label: Vault URL (DNS Name)
          format: url
        - id: client
          type: string
          label: Client ID
        - id: secret
          type: string
          label: Client Secret
          secret: true
        - id: tenant
          type: string
          label: Tenant ID
        - id: cloud_name
          label: Cloud Environment
          choices:
            - AzureCloud
            - AzureGermanCloud
            - AzureChinaCloud
            - AzureUSGovernment
          default: AzureCloud
          help_text: Specify which azure cloud environment to use.
      metadata:
        - id: secret_field
          type: string
          label: Secret Name
          help_text: The name of the secret to look up.
        - id: secret_version
          type: string
          label: Secret Version
          help_text: Used to specify a specific secret version (if left empty, the latest version will be used).
      required:
        - url
        - secret_field
    injectors: {}
  - name: mTLS Event Stream
    namespace: event_stream
    description: Credential for Event Streams that use mutual TLS. If CA Certificates are defined in the UI it will be transferred to the Gateway proxy for validation of incoming requests. We can optionally validate the Subject defined in the inbound Certificate.
    kind: mtls
    inputs:
      fields:
        - id: auth_type
          type: string
          label: Event Stream Authentication Type
          hidden: true
          default: mtls
        - id: certificate
          type: string
          label: Certificate
          format: pem_certificate
          help_text: The Certificate collection in PEM format. You can have multiple certificates in this field separated by -----BEGIN CERTIFICATE----- and ending in -----END CERTIFICATE-----If a certificate is provided it will be transferred to the Gateway, otherwise its assumed that the Gateway already has the CA certificates in place to validate the incoming client certificate.
          multiline: true
        - id: subject
          type: string
          label: Certificate Subject
          help_text: The Subject from Certificate compliant with RFC 2253.This is optional and can be used to check the subject defined in the certificate. It can contains regular expression to match indivisual attributes in the subject name. E.g., CN=[agent1,agent2].example.com,ST=[NJ|NY]
        - id: http_header_key
          type: string
          label: HTTP Header Key
          hidden: true
          default: Subject
      required:
        - auth_type
        - http_header_key
    injectors: {}
  - name: OAuth2 Event Stream
    namespace: event_stream
    description: Credential for Event Streams that use OAuth2. This needs a client id and client credential and access to an Authorization server so we can introspect the token being sent.
    kind: oauth2
    inputs:
      fields:
        - id: auth_type
          type: string
          label: Event Stream Authentication Type
          hidden: true
          default: oauth2
        - id: client_id
          type: string
          label: Client ID
          help_text: The Client ID from the Authorization Server.
        - id: client_secret
          type: string
          label: Client Secret
          secret: true
          help_text: The Client Secret from the Authorization Server.
        - id: introspection_url
          type: string
          label: Introspection URL
          help_text: The Introspection URL from the Authorization Server as defined in RFC 7662.
        - id: http_header_key
          type: string
          label: HTTP Header Key
          hidden: true
          default: Authorization
          help_text: The HTTP header for passing in the token usually this is Authorization.
      required:
        - auth_type
        - http_header_key
        - client_secret
        - client_id
        - introspection_url
    injectors: {}
  - name: OAuth2 JWT Event Stream
    namespace: event_stream
    description: Credential for Event Streams that use OAuth2 with JWT. This needs a JWKS URL which will be used to fetch the public key and validate the incoming token. If an audience is specified we will check the audience in the JWT claims.
    kind: oauth2_jwt
    inputs:
      fields:
        - id: auth_type
          type: string
          label: Event Stream Authentication Type
          hidden: true
          default: oauth2-jwt
        - id: jwks_url
          type: string
          label: JWKS URL
          help_text: JSON Web Key Sets URL to fetch public keys to validate JWT token. Its usually https://<your auth server>/.well-known/jwks.json
        - id: audience
          type: string
          label: Audience
          help_text: Audience from the JWT claims, if specified we will validate the audience in the JWT claims.
        - id: http_header_key
          type: string
          label: HTTP Header Key
          hidden: true
          default: Authorization
          help_text: The HTTP header for passing in the token usually this is Authorization.
      required:
        - auth_type
        - jwks_url
        - http_header_key
    injectors: {}
  - name: Postgres
    namespace: postgres
    description: ""
    kind: cloud
    inputs:
      fields:
        - id: postgres_db_host
          label: Postgres DB Host
          help_text: Postgres DB Server
        - id: postgres_db_port
          label: Postgres DB Port
          default: "5432"
          help_text: Postgres DB Port
        - id: postgres_db_name
          label: Postgres DB Name
          help_text: Postgres Database name
        - id: postgres_db_user
          label: Postgres DB User
          help_text: Postgres Database user
        - id: postgres_db_password
          label: Postgres DB Password
          secret: true
          help_text: Postgres Database password
        - id: postgres_sslmode
          label: Postgres SSL Mode
          choices:
            - disable
            - allow
            - prefer
            - require
            - verify-ca
            - verify-full
          default: prefer
          help_text: Postgres SSL Mode
        - id: postgres_sslcert
          label: Postgres SSL Certificate
          default: ""
          help_text: Postgres SSL Certificate
          multiline: true
        - id: postgres_sslkey
          label: Postgres SSL Key
          secret: true
          default: ""
          help_text: Postgres SSL Key
          multiline: true
        - id: postgres_sslpassword
          label: Postgres SSL Password
          secret: true
          default: ""
          help_text: Postgres SSL Password for key
        - id: postgres_sslrootcert
          label: Postgres SSL Root Certificate
          default: ""
          help_text: Postgres SSL Root Certificate
          multiline: true
    injectors:
      file:
        template.postgres_sslkey: '{%- raw -%} ''{{ postgres_sslkey }}'' {%- endraw -%}'
        template.postgres_sslcert: '{%- raw -%} ''{{ postgres_sslcert }}'' {%- endraw -%}'
        template.postgres_sslrootcert: '{%- raw -%} ''{{ postgres_sslrootcert }}'' {%- endraw -%}'
      extra_vars:
        postgres_db_host: '{%- raw -%} ''{{ postgres_db_host }}'' {%- endraw -%}'
        postgres_db_name: '{%- raw -%} ''{{ postgres_db_name }}'' {%- endraw -%}'
        postgres_db_port: '{%- raw -%} ''{{ postgres_db_port }}'' {%- endraw -%}'
        postgres_db_user: '{%- raw -%} ''{{ postgres_db_user }}'' {%- endraw -%}'
        postgres_sslmode: '{%- raw -%} ''{{ postgres_sslmode }}'' {%- endraw -%}'
        postgres_db_password: '{%- raw -%} ''{{ postgres_db_password }}'' {%- endraw -%}'
        postgres_sslpassword: '{%- raw -%} ''{{ postgres_sslpassword | default(None) }}'' {%- endraw -%}'
  - name: Red Hat Ansible Automation Platform
    namespace: controller
    description: ""
    kind: cloud
    inputs:
      fields:
        - id: host
          type: string
          label: Red Hat Ansible Automation Platform
          help_text:
            - Red Hat Ansible Automation Platform base URL to authenticate with.
            - 'For Event-Driven Ansible controller 2.5 with Ansible Automation Controller 2.4, use the following example: https://<<your_controller_host>>'
            - 'For Ansible Automation Controller 2.5, use the following example: https://<<your_gateway_host>>/api/controller/'
        - id: username
          type: string
          label: Username
          help_text: Red Hat Ansible Automation Platform username id to authenticate as.This should not be set if an OAuth token is being used.
        - id: password
          type: string
          label: Password
          secret: true
        - id: oauth_token
          type: string
          label: OAuth Token
          secret: true
          help_text: An OAuth token to use to authenticate with.This should not be set if username/password are being used.
        - id: verify_ssl
          type: boolean
          label: Verify SSL
          secret: false
        - id: request_timeout
          type: string
          label: Request Timeout
          secret: false
          default: "10"
          help_text:
            - Specify the timeout Ansible should use in requests tothe host. Defaults to 10s
      required:
        - host
    injectors:
      env:
        AAP_TOKEN: '{%- raw -%} ''{{oauth_token}}'' {%- endraw -%}'
        TOWER_HOST: '{%- raw -%} ''{{host}}'' {%- endraw -%}'
        AAP_HOSTNAME: '{%- raw -%} ''{{host}}'' {%- endraw -%}'
        AAP_PASSWORD: '{%- raw -%} ''{{password}}'' {%- endraw -%}'
        AAP_USERNAME: '{%- raw -%} ''{{username}}'' {%- endraw -%}'
        AAP_VERIFY_SSL: '{%- raw -%} ''{{verify_ssl}}'' {%- endraw -%}'
        TOWER_PASSWORD: '{%- raw -%} ''{{password}}'' {%- endraw -%}'
        TOWER_USERNAME: '{%- raw -%} ''{{username}}'' {%- endraw -%}'
        CONTROLLER_HOST: '{%- raw -%} ''{{host}}'' {%- endraw -%}'
        TOWER_VERIFY_SSL: '{%- raw -%} ''{{verify_ssl}}'' {%- endraw -%}'
        TOWER_OAUTH_TOKEN: '{%- raw -%} ''{{oauth_token}}'' {%- endraw -%}'
        AAP_REQUEST_TIMEOUT: '{%- raw -%} ''{{request_timeout}}'' {%- endraw -%}'
        CONTROLLER_PASSWORD: '{%- raw -%} ''{{password}}'' {%- endraw -%}'
        CONTROLLER_USERNAME: '{%- raw -%} ''{{username}}'' {%- endraw -%}'
        CONTROLLER_VERIFY_SSL: '{%- raw -%} ''{{verify_ssl}}'' {%- endraw -%}'
        CONTROLLER_OAUTH_TOKEN: '{%- raw -%} ''{{oauth_token}}'' {%- endraw -%}'
        CONTROLLER_REQUEST_TIMEOUT: '{%- raw -%} ''{{request_timeout}}'' {%- endraw -%}'
      extra_vars:
        aap_token: '{%- raw -%} ''{{oauth_token}}'' {%- endraw -%}'
        aap_hostname: '{%- raw -%} ''{{host}}'' {%- endraw -%}'
        aap_password: '{%- raw -%} ''{{password}}'' {%- endraw -%}'
        aap_username: '{%- raw -%} ''{{username}}'' {%- endraw -%}'
        aap_verify_ssl: '{%- raw -%} ''{{verify_ssl}}'' {%- endraw -%}'
        aap_request_timeout: '{%- raw -%} ''{{request_timeout}}'' {%- endraw -%}'
  - name: ServiceNow Event Stream
    namespace: event_stream
    description: Credential for ServiceNow Event Stream. This is a specialization of the Token authentication which only requires a token to be provided.
    kind: snow
    inputs:
      fields:
        - id: auth_type
          type: string
          label: Event Stream Authentication Type
          hidden: true
          default: token
        - id: token
          type: string
          label: Token
          secret: true
          help_text: The symmetrical shared token between EDA and the ServiceNow Server. Please save this value since you would need it on the EventStream Server.
        - id: http_header_key
          type: string
          label: HTTP Header Key
          hidden: true
          default: Authorization
          help_text: The HTTP header for passing in the token usually this is Authorization but some sites use a different header, e.g. X-Gitlab-Token
      required:
        - auth_type
        - token
        - http_header_key
    injectors: {}
  - name: Source Control
    namespace: scm
    description: ""
    kind: scm
    inputs:
      fields:
        - id: username
          type: string
          label: Username
        - id: password
          type: string
          label: Password
          secret: true
        - id: ssh_key_data
          type: string
          label: SCM Private Key
          format: ssh_private_key
          secret: true
          multiline: true
        - id: ssh_key_unlock
          type: string
          label: Private Key Passphrase
          secret: true
    injectors: {}
  - name: Thycotic DevOps Secrets Vault
    namespace: thycotic_dsv
    description: ""
    kind: external
    inputs:
      fields:
        - id: tenant
          type: string
          label: Tenant
          help_text: The tenant e.g. "ex" when the URL is https://ex.secretsvaultcloud.com
        - id: tld
          label: Top-level Domain (TLD)
          choices:
            - ca
            - com
            - com.au
            - eu
          default: com
          help_text: The TLD of the tenant e.g. "com" when the URL is https://ex.secretsvaultcloud.com
        - id: client_id
          type: string
          label: Client ID
        - id: client_secret
          type: string
          label: Client Secret
          secret: true
      metadata:
        - id: path
          type: string
          label: Secret Path
          help_text: The secret path e.g. /test/secret1
        - id: secret_field
          type: string
          label: Secret Field
          help_text: The field to extract from the secret
        - id: secret_decoding
          type: string
          label: Should the secret be base64 decoded?
          choices:
            - No Decoding
            - Decode Base64
          default: No Decoding
          help_text: Specify whether the secret should be base64 decoded, typically used for storing files, such as SSH keys
      required:
        - tenant
        - client_id
        - client_secret
        - path
        - secret_field
        - secret_decoding
    injectors: {}
  - name: Thycotic Secret Server
    namespace: thycotic_tss
    description: ""
    kind: external
    inputs:
      fields:
        - id: server_url
          type: string
          label: Secret Server URL
          help_text: The Base URL of Secret Server e.g. https://myserver/SecretServer or https://mytenant.secretservercloud.com
        - id: username
          type: string
          label: Username
          help_text: The (Application) user username
        - id: domain
          type: string
          label: Domain
          help_text: The (Application) user domain
        - id: password
          type: string
          label: Password
          secret: true
          help_text: The corresponding password
      metadata:
        - id: secret_id
          type: string
          label: Secret ID
          help_text: The integer ID of the secret
        - id: secret_field
          type: string
          label: Secret Field
          help_text: The field to extract from the secret
      required:
        - server_url
        - username
        - password
        - secret_id
        - secret_field
    injectors: {}
  - name: Token Event Stream
    namespace: event_stream
    description: Credential for Event Streams that use Token Authentication. Usually the token is sent in the Authorization header. Some of the senders will use a special HTTP header to send the token.
    kind: token
    inputs:
      fields:
        - id: auth_type
          type: string
          label: Event Stream Authentication Type
          hidden: true
          default: token
        - id: token
          type: string
          label: Token
          secret: true
          help_text: The symmetrical shared token between EDA and the EventStream Server. Please save this value since you would need it on the EventStream Server.
        - id: http_header_key
          type: string
          label: HTTP Header Key
          default: Authorization
          help_text: The HTTP header for passing in the token usually this is Authorization but some sites use a different header, e.g. X-Gitlab-Token
      required:
        - auth_type
        - token
        - http_header_key
    injectors: {}
  - name: Vault
    namespace: vault
    description: ""
    kind: vault
    inputs:
      fields:
        - id: vault_password
          type: string
          label: Vault Password
          secret: true
          ask_at_runtime: true
        - id: vault_id
          type: string
          label: Vault Identifier
          format: vault_id
          help_text: 'Specify an (optional) Vault ID. This is equivalent to specifying the --vault-id Ansible parameter for providing multiple Vault passwords.  Note: this  feature only works in Ansible 2.4+.'
      required:
        - vault_password
    injectors: {}
...
