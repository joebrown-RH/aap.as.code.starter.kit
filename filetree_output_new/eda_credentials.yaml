---
eda_credentials:
  - name: Controller Credential
    description: AAP credentials
    credential_type: Red Hat Ansible Automation Platform
    organization: IT Service Automation
    references: ""
    inputs:
      host: https://aap-aap.apps.cluster-4s42h-1.dynamic.redhatworkshops.io/api/controller/
      password: '{{ vaulted_eda_credentials_controller_credential_password }}'
      request_timeout: 10
      username: admin
      verify_ssl: True
  - name: ServiceNow Event Stream
    description: ServiceNow event stream Credential
    credential_type: ServiceNow Event Stream
    organization: IT Service Automation
    references: ""
    inputs:
      auth_type: token
      http_header_key: Authorization
      token: '{{ vaulted_eda_credentials_servicenow_event_stream_token }}'
  - name: registry.redhat.io
    description: registry.redhat.io credentials
    credential_type: Container Registry
    organization: IT Service Automation
    references: ""
    inputs:
      host: registry.redhat.io
      password: '{{ vaulted_eda_credentials_registry_redhat_io_password }}'
      username: zigfreed
      verify_ssl: True
...
